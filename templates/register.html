<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 校园集市</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-page {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 50%, #f3f4f6 100%);
        }
        .auth-card {
            background: #fff; border-radius: 16px; padding: 40px 36px;
            width: 420px; max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
        }
        .auth-card .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-card .auth-logo .icon {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .auth-card h2 { font-size: 20px; text-align: center; margin-bottom: 4px; }
        .auth-card .sub { text-align: center; color: var(--gray-400); font-size: 13px; margin-bottom: 24px; }
        .auth-card .link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--gray-500); }
        .auth-card .link a { font-weight: 600; }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="icon">🏫</div>
        </div>
        <h2>注册账号</h2>
        <p class="sub">加入校园集市，开始分享与交流</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">学号 <span class="required">*</span></label>
                <input type="text" name="user_id" class="form-input"
                       placeholder="请输入学号" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">昵称 <span class="required">*</span></label>
                <input type="text" name="nickname" class="form-input"
                       placeholder="给自己起个名字" required>
            </div>
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="text" name="phone" class="form-input"
                       placeholder="选填">
            </div>
            <div class="form-group">
                <label class="form-label">密码 <span class="required">*</span></label>
                <input type="password" name="password" class="form-input"
                       placeholder="设置密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">
                注 册
            </button>
        </form>

        <p class="link">已有账号？<a href="{{ url_for('login') }}">去登录</a></p>
    </div>
</div>
</body>
</html>
