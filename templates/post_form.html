{% extends "base.html" %}
{% block title %}发帖{% endblock %}

{% block content %}
<div class="page-header">
    <h2>✏️ 发布新帖</h2>
    <p class="subtitle">选择板块与类型，填写内容即可发布</p>
</div>

<div class="form-card" style="max-width:720px;">
    <form method="POST" action="{{ url_for('create_post') }}">
        <div class="form-section-title">📋 基本信息</div>
        <p style="font-size:13px;color:var(--text-tertiary);margin-bottom:16px;">
            发布者：<b>{{ current_user.nickname }}</b> ({{ current_user.user_id }})
        </p>
        <div class="form-row cols-2">
            <div class="form-group">
                <label class="form-label">板块 <span class="required">*</span></label>
                <select name="sec_id" class="form-select" required>
                    {% for s in sections %}
                    {% if s.sec_id != 1 %}<option value="{{ s.sec_id }}">{{ s.name }}</option>{% endif %}
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">帖子类型</label>
                <select name="post_type" class="form-select" id="postType">
                    <option value="normal">📋 普通帖</option>
                    <option value="red">🧧 红包帖</option>
                </select>
            </div>
        </div>

        <div class="form-group" id="redAmountGroup" style="display:none;">
            <label class="form-label">红包金额（元）</label>
            <input type="number" name="red_amount" class="form-input"
                   value="10" min="1" max="500" step="1" style="max-width:200px;">
            <p class="form-hint">红包帖将自动发布到「红包帖」板块，并在最新动态中优先展示</p>
        </div>

        <div class="form-section-title">📝 帖子内容</div>
        <div class="form-group">
            <label class="form-label">标题 <span class="required">*</span></label>
            <input type="text" name="title" class="form-input" placeholder="请输入帖子标题" maxlength="100" required>
        </div>
        <div class="form-group">
            <label class="form-label">内容 <span class="required">*</span></label>
            <textarea name="content" class="form-textarea" placeholder="请输入帖子内容..." required></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">联系方式</label>
            <input type="text" name="contact" class="form-input" placeholder="微信 / QQ / 电话（选填）" style="max-width:300px;">
        </div>

        <button type="submit" class="btn btn-primary btn-block">📤 发布帖子</button>
    </form>
</div>

<script>
document.getElementById('postType').addEventListener('change', function() {
    document.getElementById('redAmountGroup').style.display = this.value === 'red' ? 'block' : 'none';
});
</script>
{% endblock %}
